name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Create swap space (Tambahan RAM 4GB)
      run: |
        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=4096
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile

    - name: Extract KasirPintar Project
      run: |
        mkdir -p KasirPintar
        unzip -o KasirPintar_Project.zip -d KasirPintar

    - name: Install Buildozer and Safe Dependencies
      run: |
        pip install "buildozer==1.5.0" "python-for-android==2024.1.21" "cython<3.0.0"
        pip install --upgrade pip setuptools virtualenv

    - name: Build APK with Buildozer
      run: |
        cd KasirPintar
        yes | buildozer android debug

    - name: Upload APK to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: KasirPintar-APK
        path: KasirPintar/bin/*.apk
